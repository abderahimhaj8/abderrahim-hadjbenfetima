
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">رحيم - لبرمجة ونسخ مفاتيح السيارات</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Google Fonts (Tajawal for Arabic & Poppins for French) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                        fr: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        gold: {
                            400: '#FBBF24',
                            500: '#F59E0B',
                            600: '#D97706',
                        }
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 2s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(245, 158, 11, 0.4)' },
                            '50%': { boxShadow: '0 0 25px rgba(245, 158, 11, 0.8)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
            background-attachment: fixed;
            color: #f8fafc;
        }
        
        /* Glassmorphism utility */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hover-card {
            transition: all 0.3s ease;
        }
        
        .hover-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        
        .circle-btn {
            transition: all 0.3s ease;
        }

        .circle-btn:hover {
            transform: translateY(-4px) scale(1.05);
        }

        /* Hide scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        /* Font switching based on lang */
        html[lang="fr"] body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased relative transition-all duration-300">

    <!-- Main Container -->
    <div class="glass-card w-full max-w-md rounded-3xl p-8 shadow-2xl relative overflow-hidden transition-all duration-300">
        
        <!-- زر QR Code مع تثبيت الاتجاه -->
        <button onclick="openQRModal()" dir="rtl" title="عرض رمز QR" class="absolute top-5 left-5 z-30 px-4 py-2 rounded-full bg-white/10 hover:bg-gold-500/20 border border-white/20 hover:border-gold-500/50 flex items-center justify-center gap-2 text-white hover:text-gold-400 transition-all shadow-lg hover:scale-105">
            <i class="fa-solid fa-qrcode text-lg"></i>
            <span id="qr-btn-text" class="text-xs font-bold mt-0.5">شارك البطاقة</span>
        </button>

        <!-- زر تغيير اللغة مع تثبيت الاتجاه -->
        <button onclick="toggleLanguage()" dir="rtl" title="تغيير اللغة" class="absolute top-5 right-5 z-30 px-4 py-2 rounded-full bg-white/10 hover:bg-blue-500/20 border border-white/20 hover:border-blue-500/50 flex items-center justify-center gap-2 text-white hover:text-blue-400 transition-all shadow-lg hover:scale-105">
            <i class="fa-solid fa-globe text-lg"></i>
            <span id="lang-toggle-text" class="text-xs font-bold mt-0.5" style="font-family: 'Poppins', sans-serif;">FR</span>
        </button>

        <!-- Decorative Background Elements -->
        <div class="absolute top-0 right-0 -mr-16 -mt-16 w-32 h-32 rounded-full bg-gold-500 opacity-30 blur-3xl"></div>
        <div class="absolute bottom-0 left-0 -ml-16 -mb-16 w-40 h-40 rounded-full bg-blue-600 opacity-30 blur-3xl"></div>
        <div class="absolute top-1/2 left-1/4 w-32 h-32 rounded-full bg-purple-600 opacity-20 blur-3xl"></div>

        <!-- Logo Section -->
        <div class="flex flex-col items-center relative z-10 mt-6">
            <!-- Custom Logo from User's Identity (Dark Mode Version) -->
            <div class="w-32 h-32 rounded-full border-2 border-gold-500 flex items-center justify-center bg-gray-900 shadow-lg animate-pulse-glow mb-4 p-3">
                <svg viewBox="65 30 260 260" class="w-full h-full animate-float drop-shadow-md" xmlns="http://www.w3.org/2000/svg">
                    <!-- تأثير الإشعاع اللاسلكي -->
                    <path d="M 130 135 A 30 30 0 0 0 130 185" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" fill="none"></path>
                    <path d="M 110 115 A 55 55 0 0 0 110 205" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" fill="none"></path>
                    <path d="M 90 95 A 80 80 0 0 0 90 225" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"></path>

                    <!-- رأس المفتاح الذكي -->
                    <rect x="150" y="125" width="80" height="70" rx="18" fill="#3b82f6"></rect>
                    <!-- أزرار المفتاح -->
                    <circle cx="175" cy="160" r="10" fill="#f8fafc"></circle>
                    <rect x="200" y="152" width="16" height="16" rx="4" fill="#f8fafc"></rect>
                    <circle cx="190" cy="138" r="3" fill="#f87171"></circle> 

                    <!-- نصل المفتاح المعدني -->
                    <path d="M 225 145 L 300 145 L 310 152 L 290 152 L 290 162 L 275 162 L 275 152 L 230 152 Z" fill="#cbd5e1"></path>
                    <line x1="230" y1="148" x2="295" y2="148" stroke="#94a3b8" stroke-width="2"></line>
                </svg>
            </div>
            
            <h1 id="main-title" class="text-3xl font-bold text-white mb-1">رحيم للمفاتيح</h1>
            <p class="text-gold-400 text-sm font-medium mb-2 tracking-wide">RAHIM KEY</p>
            <p id="desc-text" class="text-slate-200 text-center text-sm md:text-base leading-relaxed mb-5 px-5 py-3 bg-white/5 rounded-2xl border border-white/10 shadow-sm backdrop-blur-sm">
                خبير في <span class="text-gold-400 font-bold">نسخ</span>، <span class="text-gold-400 font-bold">برمجة</span>، وإصلاح جميع أنواع مفاتيح السيارات <span class="text-blue-300 font-bold">الذكية والمشفرة</span>.
            </p>

            <!-- Quick Action Circular Buttons - تثبيت الاتجاه إلى اليمين -->
            <div class="flex items-center justify-center gap-6 w-full mb-6" dir="rtl">
                <!-- Phone -->
                <div class="flex flex-col items-center gap-2">
                    <a href="tel:0559695891" title="اتصل بنا" class="circle-btn w-14 h-14 rounded-full bg-gold-500/10 border border-gold-500/30 flex items-center justify-center text-gold-500 hover:bg-gold-500 hover:text-white shadow-lg hover:shadow-gold-500/40">
                        <i class="fa-solid fa-phone text-2xl"></i>
                    </a>
                    <span id="call-btn-text" class="text-xs text-gray-300 font-medium">اتصل بنا</span>
                </div>

                <!-- Save Contact -->
                <div class="flex flex-col items-center gap-2">
                    <button onclick="downloadVCard()" title="حفظ الرقم في الهاتف" class="circle-btn w-14 h-14 rounded-full bg-teal-500/10 border border-teal-500/30 flex items-center justify-center text-teal-500 hover:bg-teal-500 hover:text-white shadow-lg hover:shadow-teal-500/40">
                        <i class="fa-solid fa-user-plus text-xl"></i>
                    </button>
                    <span id="save-btn-text" class="text-xs text-gray-300 font-medium">احفظ الرقم</span>
                </div>

                <!-- WhatsApp -->
                <div class="flex flex-col items-center gap-2">
                    <a href="https://wa.me/213559695891" target="_blank" title="مراسلة عبر واتساب" class="circle-btn w-14 h-14 rounded-full bg-green-500/10 border border-green-500/30 flex items-center justify-center text-green-500 hover:bg-green-500 hover:text-white shadow-lg hover:shadow-green-500/40">
                        <i class="fa-brands fa-whatsapp text-3xl"></i>
                    </a>
                    <span id="wa-btn-text" class="text-xs text-gray-300 font-medium">واتساب</span>
                </div>
            </div>
        </div>

        <!-- Action Buttons (2x2 Grid) - تثبيت الاتجاه إلى اليمين -->
        <div class="grid grid-cols-2 gap-4 relative z-10" dir="rtl">
            <!-- Facebook -->
            <a href="https://web.facebook.com/profile.php?id=100063619398517&locale=fr_FR" target="_blank" class="hover-card flex flex-col items-center justify-center gap-3 p-4 rounded-2xl bg-blue-500/10 border border-blue-500/30 hover:bg-blue-500/20 hover:border-blue-500 group text-white text-center">
                <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                    <i class="fa-brands fa-facebook-f text-2xl"></i>
                </div>
                <span id="fb-btn-text" class="font-bold text-sm text-blue-50 group-hover:text-white transition-colors">فيسبوك</span>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/programation_cle_auto/" target="_blank" class="hover-card flex flex-col items-center justify-center gap-3 p-4 rounded-2xl bg-fuchsia-500/10 border border-fuchsia-500/30 hover:bg-fuchsia-500/20 hover:border-fuchsia-500 group text-white text-center">
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 flex items-center justify-center text-white shadow-lg shadow-fuchsia-500/30">
                    <i class="fa-brands fa-instagram text-2xl"></i>
                </div>
                <span id="ig-btn-text" class="font-bold text-sm text-fuchsia-50 group-hover:text-white transition-colors">إنستغرام</span>
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@rahim_key?_r=1&_t=ZS-95ugPeCr9ph" target="_blank" class="hover-card flex flex-col items-center justify-center gap-3 p-4 rounded-2xl bg-pink-500/10 border border-pink-500/30 hover:bg-pink-500/20 hover:border-pink-500 group text-white text-center">
                <div class="w-12 h-12 rounded-full bg-gradient-to-r from-cyan-500 to-pink-500 flex items-center justify-center text-white shadow-lg shadow-pink-500/30">
                    <i class="fa-brands fa-tiktok text-2xl"></i>
                </div>
                <span id="tt-btn-text" class="font-bold text-sm text-pink-50 group-hover:text-white transition-colors">تيك توك</span>
            </a>

            <!-- GPS Location -->
            <a href="https://maps.app.goo.gl/vEGoAhwDB3a4mtoaA" target="_blank" class="hover-card flex flex-col items-center justify-center gap-3 p-4 rounded-2xl bg-red-500/10 border border-red-500/30 hover:bg-red-500/20 hover:border-red-500 group text-white text-center">
                <div class="w-12 h-12 rounded-full bg-red-500 flex items-center justify-center text-white shadow-lg shadow-red-500/30">
                    <i class="fa-solid fa-location-dot text-2xl"></i>
                </div>
                <span id="gps-btn-text" class="font-bold text-sm text-red-50 group-hover:text-white transition-colors">الموقع (GPS)</span>
            </a>
        </div>

    </div>

    <!-- QR Code Modal Overlay -->
    <div id="qrModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-950/80 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <!-- Modal Content -->
        <div id="qrModalContent" class="glass-card bg-[#0f172a] border border-gray-700 p-8 rounded-3xl shadow-2xl relative transform scale-95 transition-transform duration-300 max-w-sm w-[90%] flex flex-col items-center" dir="rtl">
            
            <!-- Close Button -->
            <button onclick="closeQRModal()" class="absolute top-4 left-4 w-8 h-8 flex items-center justify-center rounded-full bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-colors">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>

            <div class="w-12 h-12 rounded-full bg-gold-500/20 flex items-center justify-center text-gold-500 mb-4">
                <i class="fa-solid fa-qrcode text-2xl"></i>
            </div>
            
            <h3 id="modal-title" class="text-white text-xl font-bold mb-6 text-center">شارك البطاقة</h3>
            
            <!-- QR Code Container -->
            <div class="bg-white p-4 rounded-xl shadow-lg border-2 border-gold-500 mb-4" id="qrcode"></div>
            
            <p id="modal-desc" class="text-sm text-gray-400 text-center mt-2">امسح الرمز ضوئياً للوصول إلى هذه البطاقة</p>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Language Data Dictionary
        const translations = {
            ar: {
                pageTitle: "رحيم - لبرمجة ونسخ مفاتيح السيارات",
                qrBtn: "شارك البطاقة",
                mainTitle: "رحيم للمفاتيح",
                desc: "خبير في <span class='text-gold-400 font-bold'>نسخ</span>، <span class='text-gold-400 font-bold'>برمجة</span>، وإصلاح جميع أنواع مفاتيح السيارات <span class='text-blue-300 font-bold'>الذكية والمشفرة</span>.",
                callBtn: "اتصل بنا",
                saveBtn: "احفظ الرقم",
                waBtn: "واتساب",
                fbBtn: "فيسبوك",
                igBtn: "إنستغرام",
                ttBtn: "تيك توك",
                gpsBtn: "الموقع (GPS)",
                modalTitle: "شارك البطاقة",
                modalDesc: "امسح الرمز ضوئياً للوصول إلى هذه البطاقة",
                langToggleText: "FR",
                vcardTitle: "خبير برمجة ونسخ مفاتيح السيارات",
                vcardNote: "خبير في نسخ، برمجة، وإصلاح جميع أنواع مفاتيح السيارات الذكية والمشفرة."
            },
            fr: {
                pageTitle: "Rahim - Programmation et copie de clés auto",
                qrBtn: "Partager",
                mainTitle: "Rahim Clés",
                desc: "Expert en <span class='text-gold-400 font-bold'>copie</span>, <span class='text-gold-400 font-bold'>programmation</span>, et réparation de tous types de clés de voitures <span class='text-blue-300 font-bold'>intelligentes et codées</span>.",
                callBtn: "Appeler",
                saveBtn: "Enregistrer",
                waBtn: "WhatsApp",
                fbBtn: "Facebook",
                igBtn: "Instagram",
                ttBtn: "TikTok",
                gpsBtn: "Localisation (GPS)",
                modalTitle: "Partager la carte",
                modalDesc: "Scannez le code pour accéder à cette carte",
                langToggleText: "عربي",
                vcardTitle: "Expert en programmation et copie de clés auto",
                vcardNote: "Expert en copie, programmation et réparation de tous types de clés de voitures intelligentes et codées."
            }
        };

        let currentLang = 'ar';

        // Language Toggle Function
        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'fr' : 'ar';
            
            // Update HTML Lang & Dir attributes (Text direction adapts, layout is locked)
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

            // Update Texts
            document.getElementById('page-title').innerText = translations[currentLang].pageTitle;
            document.getElementById('qr-btn-text').innerText = translations[currentLang].qrBtn;
            document.getElementById('main-title').innerText = translations[currentLang].mainTitle;
            document.getElementById('desc-text').innerHTML = translations[currentLang].desc; // innerHTML to keep styling spans
            document.getElementById('call-btn-text').innerText = translations[currentLang].callBtn;
            document.getElementById('save-btn-text').innerText = translations[currentLang].saveBtn;
            document.getElementById('wa-btn-text').innerText = translations[currentLang].waBtn;
            document.getElementById('fb-btn-text').innerText = translations[currentLang].fbBtn;
            document.getElementById('ig-btn-text').innerText = translations[currentLang].igBtn;
            document.getElementById('tt-btn-text').innerText = translations[currentLang].ttBtn;
            document.getElementById('gps-btn-text').innerText = translations[currentLang].gpsBtn;
            document.getElementById('modal-title').innerText = translations[currentLang].modalTitle;
            document.getElementById('modal-desc').innerText = translations[currentLang].modalDesc;
            
            // Update Toggle Button Text based on font
            const langToggle = document.getElementById('lang-toggle-text');
            langToggle.innerText = translations[currentLang].langToggleText;
            langToggle.style.fontFamily = currentLang === 'ar' ? "'Poppins', sans-serif" : "'Tajawal', sans-serif";
        }


        // Generate QR Code dynamically pointing to the current page URL
        function initQRCode() {
            // Check if the QRCode library is completely loaded
            if (typeof QRCode === 'undefined') {
                setTimeout(initQRCode, 100); // Retry after 100ms
                return;
            }

            var currentUrl = window.location.href;
            
            if(currentUrl.startsWith("file://") || currentUrl.includes("blob:")) {
                currentUrl = "https://wa.me/213559695891";
            }

            // Ensure the container is clear before drawing
            var qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";

            new QRCode(qrContainer, {
                text: currentUrl,
                width: 160,
                height: 160,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // Use window.onload to ensure all external scripts are fetched and ready
        window.addEventListener('load', initQRCode);

        // --- Modal Functions ---
        function openQRModal() {
            const modal = document.getElementById('qrModal');
            const modalContent = document.getElementById('qrModalContent');
            
            // Show modal
            modal.classList.remove('hidden');
            
            // Trigger animation
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeQRModal() {
            const modal = document.getElementById('qrModal');
            const modalContent = document.getElementById('qrModalContent');
            
            // Reverse animation
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            // Hide modal after animation ends
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Close modal when clicking outside the content
        document.getElementById('qrModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeQRModal();
            }
        });

        // Function to create and download vCard (Dynamic Language Support)
        function downloadVCard() {
            // vCard Data
            const vcardData = 
`BEGIN:VCARD
VERSION:3.0
FN:${translations[currentLang].mainTitle}
ORG:RAHIM KEY
TITLE:${translations[currentLang].vcardTitle}
TEL;TYPE=WORK,VOICE:0559695891
URL:https://web.facebook.com/profile.php?id=100063619398517
NOTE:${translations[currentLang].vcardNote}
END:VCARD`;

            // Create a Blob containing the vCard data
            const blob = new Blob([vcardData], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);

            // Create a temporary link element to trigger the download
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Rahim_Keys.vcf';
            
            // Append, click, and remove the link
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Clean up the URL object
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
