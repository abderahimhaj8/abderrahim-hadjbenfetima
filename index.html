<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رحيم - لبرمجة ونسخ مفاتيح السيارات</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Google Fonts (Tajawal for Arabic) -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    },
                    colors: {
                        gold: {
                            400: '#FBBF24',
                            500: '#F59E0B',
                            600: '#D97706',
                        }
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 2s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(245, 158, 11, 0.4)' },
                            '50%': { boxShadow: '0 0 25px rgba(245, 158, 11, 0.8)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
            background-attachment: fixed;
            color: #f8fafc;
        }
        
        /* Glassmorphism utility */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-btn {
            transition: all 0.3s ease;
            text-align: right;
        }
        
        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        
        .circle-btn {
            transition: all 0.3s ease;
        }

        .circle-btn:hover {
            transform: translateY(-4px) scale(1.05);
        }

        /* Hide scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased">

    <!-- Main Container -->
    <div class="glass-card w-full max-w-md rounded-3xl p-8 shadow-2xl relative overflow-hidden">

        <div class="absolute top-1/2 left-1/4 w-32 h-32 rounded-full bg-purple-600 opacity-20 blur-3xl"></div>

        <!-- Logo Section -->
        <div class="flex flex-col items-center relative z-10">
            <!-- Custom Logo from User's Identity (Dark Mode Version) -->
            <div class="w-32 h-32 rounded-full border-2 border-gold-500 flex items-center justify-center bg-gray-900 shadow-lg animate-pulse-glow mb-4 p-3">
                <svg viewBox="65 30 260 260" class="w-full h-full animate-float drop-shadow-md" xmlns="http://www.w3.org/2000/svg">
                    <!-- تأثير الإشعاع اللاسلكي -->
                    <path d="M 130 135 A 30 30 0 0 0 130 185" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" fill="none"></path>
                    <path d="M 110 115 A 55 55 0 0 0 110 205" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" fill="none"></path>
                    <path d="M 90 95 A 80 80 0 0 0 90 225" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"></path>

                    <!-- رأس المفتاح الذكي -->
                    <rect x="150" y="125" width="80" height="70" rx="18" fill="#3b82f6"></rect>
                    <!-- أزرار المفتاح -->
                    <circle cx="175" cy="160" r="10" fill="#f8fafc"></circle>
                    <rect x="200" y="152" width="16" height="16" rx="4" fill="#f8fafc"></rect>
                    <circle cx="190" cy="138" r="3" fill="#f87171"></circle> 

                    <!-- نصل المفتاح المعدني -->
                    <path d="M 225 145 L 300 145 L 310 152 L 290 152 L 290 162 L 275 162 L 275 152 L 230 152 Z" fill="#cbd5e1"></path>
                    <line x1="230" y1="148" x2="295" y2="148" stroke="#94a3b8" stroke-width="2"></line>
                </svg>
            </div>
            
            <h1 class="text-3xl font-bold text-white mb-1">رحيم للمفاتيح</h1>
            <p class="text-gold-400 text-sm font-medium mb-2 tracking-wide">RAHIM KEY</p>
            <p class="text-gray-400 text-center text-sm leading-relaxed mb-5 px-4">

            <!-- Quick Action Circular Buttons -->
            <div class="flex items-center justify-center gap-6 w-full mb-6">
                <!-- Phone -->
                <div class="flex flex-col items-center gap-2">
                    <a href="tel:0559695891" title="اتصل بنا" class="circle-btn w-14 h-14 rounded-full bg-gold-500/10 border border-gold-500/30 flex items-center justify-center text-gold-500 hover:bg-gold-500 hover:text-white shadow-lg hover:shadow-gold-500/40">
                        <i class="fa-solid fa-phone text-2xl"></i>
                    </a>
                    <span class="text-xs text-gray-300 font-medium">اتصل بنا</span>

                        <i class="fa-solid fa-user-plus text-xl"></i>
                    </button>
                    <span class="text-xs text-gray-300 font-medium">احفظ الرقم</span>
                </div>

                <!-- WhatsApp -->
                <div class="flex flex-col items-center gap-2">
                    <a href="https://wa.me/213559695891" target="_blank" title="مراسلة عبر واتساب" class="circle-btn w-14 h-14 rounded-full bg-green-500/10 border border-green-500/30 flex items-center justify-center text-green-500 hover:bg-green-500 hover:text-white shadow-lg hover:shadow-green-500/40">
                        <i class="fa-brands fa-whatsapp text-3xl"></i>
                    </a>

        </div>

        <!-- Action Buttons (Links) -->
        <div class="space-y-4 relative z-10">
            <!-- Facebook -->
            <a href="https://web.facebook.com/profile.php?id=100063619398517&locale=fr_FR" target="_blank" class="social-btn flex items-center justify-between w-full p-4 rounded-xl bg-blue-500/10 border border-blue-500/30 hover:bg-blue-500/20 hover:border-blue-500 group text-white">
                <div class="flex items-center gap-4">

            <!-- Instagram -->
            <a href="https://www.instagram.com/programation_cle_auto/" target="_blank" class="social-btn flex items-center justify-between w-full p-4 rounded-xl bg-fuchsia-500/10 border border-fuchsia-500/30 hover:bg-fuchsia-500/20 hover:border-fuchsia-500 group text-white">
                <div class="flex items-center gap-4">

                </div>
                <i class="fa-solid fa-chevron-left text-fuchsia-400 group-hover:text-fuchsia-300 transition-colors"></i>
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@rahim_key?_r=1&_t=ZS-95ugPeCr9ph" target="_blank" class="social-btn flex items-center justify-between w-full p-4 rounded-xl bg-pink-500/10 border border-pink-500/30 hover:bg-pink-500/20 hover:border-pink-500 group text-white">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-cyan-500 to-pink-500 flex items-center justify-center text-white shadow-lg shadow-pink-500/30">

                    </div>
                    <span class="font-semibold text-lg text-pink-50 group-hover:text-white transition-colors">تابعنا على تيك توك</span>

            </a>

            <!-- GPS Location -->
            <a href="https://maps.app.goo.gl/vEGoAhwDB3a4mtoaA" target="_blank" class="social-btn flex items-center justify-between w-full p-4 rounded-xl bg-red-500/10 border border-red-500/30 hover:bg-red-500/20 hover:border-red-500 group text-white">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-red-500 flex items-center justify-center text-white shadow-lg shadow-red-500/30">
                        <i class="fa-solid fa-location-dot text-xl"></i>
                    </div>
                    <span class="font-semibold text-lg text-red-50 group-hover:text-white transition-colors">موقع المحل (GPS)</span>
                </div>
                <i class="fa-solid fa-chevron-left text-red-400 group-hover:text-red-300 transition-colors"></i>
            </a>
        </div>

        <!-- Divider -->
        <div class="my-8 border-t border-gray-700 relative z-10">
            <span class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#0f172a] px-3 text-xs text-gray-500">شارك البطاقة</span>
        </div>

        <!-- QR Code Section -->
        <div class="flex flex-col items-center justify-center relative z-10">
            <div class="bg-white p-3 rounded-xl shadow-lg border-2 border-gold-500 mb-3" id="qrcode"></div>
            <p class="text-xs text-gray-400 text-center">امسح الرمز ضوئياً للوصول إلى هذه البطاقة</p>
        </div>

    </div>

    <!-- Scripts -->
    <script>
        // Generate QR Code dynamically pointing to the current page URL
        function initQRCode() {
            // Check if the QRCode library is completely loaded
            if (typeof QRCode === 'undefined') {
                setTimeout(initQRCode, 100); // Retry after 100ms
                return;
            }

            var currentUrl = window.location.href;
            
            if(currentUrl.startsWith("file://") || currentUrl.includes("blob:")) {
                currentUrl = "https://wa.me/213559695891";
            }

            // Ensure the container is clear before drawing
            var qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";

            new QRCode(qrContainer, {
                text: currentUrl,
                width: 130,
                height: 130,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // Use window.onload to ensure all external scripts (like qrcode.min.js) are fetched and ready
        window.addEventListener('load', initQRCode);

        // Function to create and download vCard
        function downloadVCard() {
            // vCard Data
            const vcardData = 
`BEGIN:VCARD
VERSION:3.0
FN:رحيم للمفاتيح
ORG:RAHIM KEY
TITLE:خبير برمجة ونسخ مفاتيح السيارات
TEL;TYPE=WORK,VOICE:0559695891
URL:https://web.facebook.com/profile.php?id=100063619398517
NOTE:خبير في نسخ، برمجة، وإصلاح جميع أنواع مفاتيح السيارات الذكية والمشفرة.
END:VCARD`;

            // Create a Blob containing the vCard data
            const blob = new Blob([vcardData], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);

            // Create a temporary link element to trigger the download
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Rahim_Keys.vcf';
            
            // Append, click, and remove the link
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Clean up the URL object
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
